services:
  gh-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gh-manager
    ports:
      - "3000:3000"
    volumes:
      - ./repos.config.json:/app/repos.config.json
      - ./temp_repos:/app/temp_repos
      - ./PROJECTS.md:/app/PROJECTS.md
      - ./repos.config.example.json:/app/repos.config.example.json
      - ./.env:/app/.env
      - ~/.ssh:/root/.ssh:ro
    environment:
      - CONFIG_PATH=/app/repos.config.json
    restart: unless-stopped
